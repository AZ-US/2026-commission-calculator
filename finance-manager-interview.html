<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2ft9H5rdZvMKU8P62COYjyNlp_Tglfts",
    authDomain: "commission-calculator-dd155.firebaseapp.com",
    projectId: "commission-calculator-dd155",
    storageBucket: "commission-calculator-dd155.firebasestorage.app",
    messagingSenderId: "827374308396",
    appId: "1:827374308396:web:cea7a32bdf54125fe35589"
  };

  const EDIT_SECRET = "AmyZ2026";
  const urlParams = new URLSearchParams(window.location.search);
  const isEditor = urlParams.get('edit') === EDIT_SECRET;

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const stateDoc = doc(db, "scorecard", "finance_manager_2026");

  let saveTimer = null;

  window.__scorecard = {
    isEditor,
    subscribe(cb) {
      return onSnapshot(stateDoc, (snap) => {
        if (snap.exists()) cb(snap.data());
      }, (err) => console.error('[Firestore]', err));
    },
    scheduleSave(ratings, notes) {
      if (!isEditor) return;
      clearTimeout(saveTimer);
      setSyncStatus('saving');
      saveTimer = setTimeout(async () => {
        try {
          await setDoc(stateDoc, { ratings, notes, _updatedAt: Date.now() });
          setSyncStatus('saved');
        } catch (e) {
          console.error('[Firestore] save error:', e);
          setSyncStatus('error');
        }
      }, 600);
    }
  };

  function setSyncStatus(s) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    if (s === 'saving') { el.textContent = '同步中…'; el.className = 'sync-status saving'; }
    else if (s === 'saved') { el.textContent = '已同步 ✓'; el.className = 'sync-status saved'; }
    else { el.textContent = '同步失败'; el.className = 'sync-status error'; }
  }

  window.dispatchEvent(new Event('firestore-ready'));
</script>

<style>

  --ink-soft: #6b7384;
  --ink-mute: #9aa1b0;
  --line: #e0e3ea;
  --line-soft: #f0f2f6;
  --bg: #f7f8fb;
  --white: #ffffff;

  --red: #c0392b;
  --red-dim: #fdf1f0;
  --red-line: #f4c0bb;

  --amber-dim: #fdf6e7;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

}

/* ── Sync bar ── */
.sync-bar {

  top: 0;

  align-items: center;

}
.sync-bar .mode-badge {

  border-radius: 10px;

}
.sync-bar .mode-editor { background: rgba(255,255,255,.18); color: #fff; }
.sync-bar .mode-viewer { background: rgba(255,255,255,.10); color: rgba(255,255,255,.5); }

.sync-status { font-size: 11px; transition: color .3s; }
.sync-status.saving { color: rgba(255,220,100,.9); }
.sync-status.saved  { color: rgba(100,220,140,.9); }
.sync-status.error  { color: rgba(255,120,100,.9); }

/* ── Layout ── */
.page {

  margin: 0 auto;

}

/* ── Header ── */

}
.header::before {

}
.header-top {

}
.header-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .15em;

}
.header-title {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 26px;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -.01em;
}
.header-title em { font-style: italic; color: rgba(255,255,255,.65); }
.header-rule { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 4px; }

#overall-badge {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;

}
#overall-badge.hi { background: var(--green-dim); color: var(--green); border-color: var(--green-line); }

.header-meta {

}
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: .12em;
  text-transform: uppercase;

}
.meta-value { font-size: 13px; color: rgba(255,255,255,.8); font-weight: 500; }

/* ── Section label ── */
.section-label {

/* ── Question card ── */
.qcard {

.qcard-head {

.qcard-info { flex: 1; min-width: 0; }

.qweight {

/* ── Rating ── */
.rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rating-btns { display: flex; gap: 7px; }
.rbtn {

  color: var(--ink-soft);

  font-weight: 500;

.rbtn:not([disabled]):hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.rbtn[disabled] { cursor: not-allowed; opacity: .6; }
.rbtn.s1 { background: var(--red); color: #fff; border-color: var(--red); }
.rbtn.s3 { background: var(--amber); color: #fff; border-color: var(--amber); }
.rbtn.s5 { background: var(--green); color: #fff; border-color: var(--green); }

.score-display {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  min-width: 28px;
  text-align: center;
  color: var(--ink-mute);
  transition: color .2s;
}

/* ── Rubric ── */
.rubric {
  font-size: 12px; line-height: 1.65;
  padding: 9px 13px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  border: 1px solid transparent;

}
.rubric.show { display: block; }

/* ── Notes ── */
.note-input {

.note-input:focus { outline: none; border-color: var(--accent); background: var(--white); }
.note-input::placeholder { color: var(--ink-mute); }
.note-input[readonly] { background: var(--bg); cursor: default; color: var(--ink-soft); }

/* ── Summary ── */
.summary {

  margin-top: 1.75rem;

.summary-grid {
  display: grid;

  margin-bottom: 1.5rem;

.stat-card {
  background: var(--bg);

  border: 1px solid var(--line-soft);

  text-align: center;

  font-size: 9.5px;

.stat-value {

.progress-header {
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
  color: var(--ink-mute);
  margin-bottom: 7px;
}
.progress-track { height: 5px; background: var(--line-soft); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

.export-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
  margin-top: 1.25rem;

  letter-spacing: .01em;
}
.export-btn:hover { background: var(--accent-mid); }

/* ── Last updated ── */
.last-update {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-mute);
  margin-top: 1rem;
  text-align: right;
}

/* ── Print ── */
@media print {
  body { background: #fff; }
  .sync-bar, .export-btn { display: none; }
  .qcard { break-inside: avoid; }
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .page { padding: 1.25rem 1rem 3rem; }
  .header { padding: 1.5rem 1.25rem; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
  .summary-grid .stat-card:last-child { grid-column: span 2; }
  .header-title { font-size: 20px; }
  .rbtn { width: 38px; height: 38px; font-size: 14px; }
}
</style>

    w:.10,
    r1:'无美国税务合规经验',
    r3:'处理过 1099 申报，了解 Sales Tax 基本概念',
    r5:'有完整多州 Sales Tax 管理经验，使用过 Avalara / TaxJar，能主动识别合规风险'
  },
  {
    id:'Q9', mod:'模块六 · 软实力与文化契合', mw:'10%',
    title:'跨部门坚守财务政策',
    full:'请举一个你必须在跨部门合作中坚持财务政策（如拒绝报销或要求补凭证），遭遇阻力的案例和处理方式。',
    w:.05,
    r1:'无相关经验或直接妥协',
    r3:'能描述以沟通化解阻力的案例，结果合理',
    r5:'既坚守原则又维护关系，有清晰的沟通策略和正向结果'
  },
  {
    id:'Q10', mod:'模块六 · 软实力与文化契合', mw:'10%',
    title:'AI 与自动化工具应用',
    full:'你目前用 AI 或自动化工具辅助财务工作的方式有哪些？举一个具体的效率提升案例。',
    w:.05,
    r1:'无实际使用经验',
    r3:'有使用 ChatGPT 辅助文案 / Python 处理数据等经验',
    r5:'有系统性将 AI / 自动化嵌入财务流程的经验，能量化效率提升'
  }
];

// Local state — synced from / to Firestore
let ratings = {};  // { Q1: 5, Q2: 3, ... }
let notes   = {};  // { Q1: "...", ... }
let isEditor = false;

// Remote update received — reconcile without re-rendering everything
function applyRemote(data) {
  const remoteR = data.ratings || {};
  const remoteN = data.notes || {};
  let changed = false;

  QS.forEach(q => {
    // Ratings
    const newVal = remoteR[q.id];
    const oldVal = ratings[q.id];
    if (newVal !== oldVal) {
      if (newVal === undefined) delete ratings[q.id];
      else ratings[q.id] = newVal;
      updBtns(q.id);
      changed = true;
    }
    // Notes
    const newNote = remoteN[q.id] || '';
    const oldNote = notes[q.id] || '';
    if (newNote !== oldNote) {
      notes[q.id] = newNote;
      const ta = document.getElementById('nt-' + q.id);
      if (ta && document.activeElement !== ta) ta.value = newNote;
      changed = true;
    }
  });

  if (changed) updSum();

  if (data._updatedAt) {
    const lu = document.getElementById('last-update');
    if (lu) lu.textContent = '最后更新：' + new Date(data._updatedAt).toLocaleString('zh-CN');
  }
}

function setR(qid, val) {
  if (!isEditor) return;
  if (ratings[qid] === val) delete ratings[qid];
  else ratings[qid] = val;
  updBtns(qid);
  updSum();
  window.__scorecard.scheduleSave({ ...ratings }, { ...notes });
}

function setNote(qid, val) {
  if (!isEditor) return;
  if (val) notes[qid] = val;
  else delete notes[qid];
  window.__scorecard.scheduleSave({ ...ratings }, { ...notes });
}

function updBtns(qid) {
  const v = ratings[qid];
  [1,3,5].forEach(r => {
    const b = document.getElementById('b-'+qid+'-'+r);
    if (!b) return;
    b.className = 'rbtn' + (v === r ? ' s'+r : '');
  });
  const sd = document.getElementById('sd-'+qid);
  if (sd) {
    sd.textContent = v !== undefined ? v : '—';
    sd.style.color = v===5 ? 'var(--green)' : v===3 ? 'var(--amber)' : v===1 ? 'var(--red)' : 'var(--ink-mute)';
  }
  updRubric(qid);
}

function updRubric(qid) {
  const v = ratings[qid];
  const el = document.getElementById('rub-'+qid);
  if (!el) return;
  const q = QS.find(x => x.id === qid);
  if (v === undefined) { el.className = 'rubric'; el.textContent = ''; return; }
  el.className = 'rubric show rubric-'+v;
  el.textContent = v + '分 — ' + (v===1 ? q.r1 : v===3 ? q.r3 : q.r5);
}

function calcW() {
  let tot = 0, ws = 0;
  QS.forEach(q => {
    const r = ratings[q.id];
    if (r !== undefined) { tot += r * q.w; ws += q.w; }
  });
  return ws === 0 ? null : (tot / ws).toFixed(2);
}

function verdict(sc) {
  if (sc === null) return {lbl:'尚未评分', cls:''};
  const s = parseFloat(sc);
  if (s >= 4.0) return {lbl:'强烈推荐录用', cls:'hi'};
  if (s >= 3.0) return {lbl:'建议考虑（评估短板）', cls:'mid'};
  return {lbl:'暂不推荐', cls:'lo'};
}

function updSum() {
  const ws = calcW();
  const cnt = Object.keys(ratings).length;
  const v = verdict(ws);
  const pct = Math.round(cnt / 10 * 100);

  document.getElementById('wscore').textContent = ws !== null ? ws : '—';
  document.getElementById('rcnt').textContent = cnt + '/10';
  document.getElementById('pband').textContent = v.lbl;
  document.getElementById('hsc').textContent = ws !== null ? ws : '—';
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';

  const bg = document.getElementById('overall-badge');
  bg.textContent = v.lbl;
  bg.className = v.cls;
}

function renderQ() {
  const list = document.getElementById('qlist');
  list.innerHTML = '';
  let lastMod = null;

  QS.forEach(q => {
    if (q.mod !== lastMod) {
      const sl = document.createElement('div');
      sl.className = 'section-label';
      sl.textContent = q.mod + ' · 权重 ' + q.mw;
      list.appendChild(sl);
      lastMod = q.mod;
    }

    const card = document.createElement('div');
    card.className = 'qcard';
    const v = ratings[q.id];
    const sdStyle = v===5 ? 'color:var(--green)' : v===3 ? 'color:var(--amber)' : v===1 ? 'color:var(--red)' : 'color:var(--ink-mute)';
    const rubCls = v === undefined ? 'rubric' : 'rubric show rubric-'+v;
    const rubTxt = v === undefined ? '' : v + '分 — ' + (v===1 ? q.r1 : v===3 ? q.r3 : q.r5);
    const dis = isEditor ? '' : ' disabled';
    const btnH = [1,3,5].map(r =>
      `<button class="rbtn${v===r?' s'+r:''}" id="b-${q.id}-${r}"${dis} onclick="setR('${q.id}',${r})">${r}</button>`
    ).join('');

    card.innerHTML = `
      <div class="qcard-head">
        <div class="qcard-info">
          <div class="qcode">${q.id} · ${q.mod.split('·')[0].trim()}</div>
          <div class="qtitle">${q.title}</div>
          <div class="qfull">${q.full}</div>
        </div>
        <span class="qweight">${Math.round(q.w*100)}%</span>
      </div>
      <div class="rating-row">
        <div class="rating-btns">${btnH}</div>
        <span class="score-display" id="sd-${q.id}" style="${sdStyle}">${v!==undefined?v:'—'}</span>
      </div>
      <div class="${rubCls}" id="rub-${q.id}">${rubTxt}</div>
      <textarea class="note-input" id="nt-${q.id}" placeholder="${isEditor ? '面试备注…' : '（只读）'}"
        ${isEditor ? `onchange="setNote('${q.id}',this.value)"` : 'readonly'}
      >${notes[q.id]||''}</textarea>
    `;
    list.appendChild(card);
  });
}

function doExport() {
  const ws = calcW();
  const v = verdict(ws);
  let lines = [
    'Finance Manager 面试评分报告',
    'Amgreat North America · Operation-Finance',
    '候选人：傅子骁 Zixiao Fu',
    '面试日期：' + new Date().toLocaleDateString('zh-CN'),
    '加权总分：' + (ws!==null?ws:'未完成'),
    '录用建议：' + v.lbl,
    '',
    '━━━ 各题得分 ━━━',
  ];
  QS.forEach(q => {
    const r = ratings[q.id];
    const n = notes[q.id] || '';
    lines.push(`${q.id}（${Math.round(q.w*100)}%）${q.title}：${r!==undefined?r+'分':'未评'}${n?' | 备注：'+n:''}`);
  });
  lines.push('', '━━━ 评分说明 ━━━', '≥4.0 强烈推荐录用 | 3.0–3.9 建议考虑（评估短板）| <3.0 暂不推荐');
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `面试评分_傅子骁_${new Date().getFullYear()}.txt`;
  a.click();
}

document.getElementById('yr').textContent = new Date().getFullYear();

// Init after Firebase is ready
window.addEventListener('firestore-ready', () => {
  isEditor = window.__scorecard.isEditor;

  const badge = document.getElementById('mode-badge');
  if (isEditor) {
    badge.textContent = '✏ 编辑模式';
    badge.className = 'mode-badge mode-editor';
  }

  renderQ();
  updSum();

  // Subscribe to Firestore real-time updates
  window.__scorecard.subscribe(data => {
    // Skip applying remote if we just saved (avoid flicker)
    applyRemote(data);
  });
});
</script>
</body>
</html>
